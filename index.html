<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MODULIMO — Habitat et mobilité écologique</title>
  <meta name="description" content="MODULIMO structure un écosystème résidentiel intégré combinant logement familial, mobilité, services et logiciel. Projet Pointe Est à Montréal." />
  <link rel="icon" type="image/png" href="images/favicon_Modulimo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:#2d5a4a; --green-lt:#3a7a62; --green-dk:#1e3d32;
      --bg:#f4f3f0; --line:#d0cec8;
      --text:#1a1a18; --muted:#5c5c56; --max:1140px;
    }
    html { scroll-behavior:smooth; scroll-padding-top:72px; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; background:#fff; color:var(--text); line-height:1.6; }
    a { color:inherit; text-decoration:none; }
    img { display:block; max-width:100%; }
    .wrap { max-width:var(--max); margin:0 auto; padding:0 24px; }
  </style>
  <script src="js/analytics.js" defer></script>
</head>
<body>
  <p>MODULIMO</p>
  <script type="module" src="/js/theme.js"></script>
</body>
</html>
